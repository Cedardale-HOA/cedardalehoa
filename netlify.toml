[build]
  base = "hugo-site"
  publish = "public"
  command = "hugo --minify"

[build.environment]
  HUGO_VERSION = "0.152.2"
  HUGO_ENV = "production"

[context.production.environment]
  HUGO_ENV = "production"

# Serve Netlify CMS admin UI
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# Set fallback for SPA-like behavior (optional)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
