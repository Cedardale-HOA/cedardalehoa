<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}" />
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />

  <link rel="icon" href="/images/favicon.ico" type="image/x-icon" />

  {{ block "head" . }}{{ end }}
</head>
<body>
  <header>
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <a href="/" title="Home">
            <picture>
              <source srcset="/images/cedardale-logo.webp" type="image/webp" />
              <img src="/images/cedardale-logo.png" alt="Cedardale Homeowners' Association" width="300" height="77" decoding="async" />
            </picture>
          </a>
        </div>
        <nav>
          {{ range .Site.Menus.main }}
            <a href="{{ .URL }}">{{ .Name }}</a>
          {{ end }}
        </nav>
        <div class="hamburger" onclick="openMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none">
            <path d="M20 7L4 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            <path d="M20 12L4 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
            <path d="M20 17L4 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </div>
      </div>
    </div>
  </header>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-close" onclick="closeMenu()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M18.3 5.71a1 1 0 0 0-1.41 0L12 10.59 7.11 5.7a1 1 0 0 0-1.41 1.41L10.59 12l-4.89 4.89a1 1 0 1 0 1.41 1.41L12 13.41l4.89 4.89a1 1 0 0 0 1.41-1.41L13.41 12l4.89-4.89a1 1 0 0 0 0-1.4z" />
        </svg>
      </span>
    </div>
    <div class="sidebar-links">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}" onclick="closeMenu()">{{ .Name }}</a>
      {{ end }}
    </div>
  </div>
  <div class="overlay" id="overlay" onclick="closeMenu()"></div>

  {{ block "main" . }}{{ end }}

  <footer>
    <p>&copy; {{ now.Format "2006" }} Cedardale HOA. All rights reserved.</p>
  </footer>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-49ZQW4Q62N"></script>
  <script> window.dataLayer = window.dataLayer || []; function gtag(){dataLayer.push(arguments);} gtag('js', new Date()); gtag('config', 'G-49ZQW4Q62N'); </script>
  <script defer src="/js/script.js"></script>
</body>
</html>
