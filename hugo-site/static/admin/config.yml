backend:
  name: github
  repo: Cedardale-HOA/cedardalehoa
  branch: main
  open_authoring: true
  auth_scope: repo

publish_mode: editorial_workflow

media_folder: "static/images/uploads"
public_folder: "/images/uploads"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "blog"
    label: "Blog"
    folder: "hugo-site/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "markdown"
    fields:
      - {name: "title", label: "Title", widget: "string"}
      - {name: "date", label: "Date", widget: "datetime"}
      - {name: "summary", label: "Summary", widget: "text"}
      - {name: "tags", label: "Tags", widget: "list", required: false}
      - {name: "body", label: "Body", widget: "markdown"}

  - name: "events"
    label: "Events"
    folder: "hugo-site/content/events"
    create: true
    slug: "{{slug}}"
    format: "markdown"
    fields:
      - {name: "title", label: "Title", widget: "string"}
      - {name: "date", label: "Date", widget: "datetime"}
      - {name: "summary", label: "Summary", widget: "text"}
      - name: "status"
        label: "Status"
        widget: "select"
        options: ["upcoming", "ongoing", "ended"]
      - {name: "location", label: "Location", widget: "string", required: false}
      - {name: "registrationLink", label: "Registration Link", widget: "string", required: false}
      - {name: "body", label: "Description", widget: "markdown"}
